<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg: #0d0d0f;
            --sidebar: #111114;
            --sidebar-hover: #1a1a1f;
            --sidebar-active: #1e1e26;
            --border: #222228;
            --text: #e8e8f0;
            --text-muted: #6b6b80;
            --text-dim: #3a3a50;
            --accent: #7c6ff7;
            --accent-glow: rgba(124, 111, 247, 0.15);
            --accent-dim: rgba(124, 111, 247, 0.08);
            --user-bubble: #1e1e2e;
            --ai-bubble: transparent;
            --input-bg: #16161c;
            --scrollbar: #222228;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-size: 14px;
        }

        #sidebar {
            width: 256px;
            min-width: 256px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: width 0.25s ease;
        }

        .sidebar-top {
            padding: 20px 16px 12px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .logo-text {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.03em;
            color: var(--text);
        }

        .logo-text span {
            color: var(--accent);
        }

        #new-chat-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-muted);
            padding: 9px 14px;
            cursor: pointer;
            font-family: 'Sora', sans-serif;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.18s ease;
            letter-spacing: 0.01em;
        }

        #new-chat-btn:hover {
            background: var(--sidebar-hover);
            color: var(--text);
            border-color: rgba(124, 111, 247, 0.25);
        }

        #new-chat-btn.active {
            background: var(--accent-dim);
            border-color: rgba(124, 111, 247, 0.35);
            color: var(--text);
            box-shadow: 0 0 16px var(--accent-glow);
        }

        #new-chat-btn svg {
            flex-shrink: 0;
        }

        #channels-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-muted);
            padding: 9px 14px;
            cursor: pointer;
            font-family: 'Sora', sans-serif;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.18s ease;
            letter-spacing: 0.01em;
            margin-top: 6px;
        }

        #channels-btn:hover {
            background: var(--sidebar-hover);
            color: var(--text);
            border-color: rgba(124, 111, 247, 0.25);
        }

        #channels-btn.active {
            background: var(--accent-dim);
            border-color: rgba(124, 111, 247, 0.35);
            color: var(--text);
            box-shadow: 0 0 16px var(--accent-glow);
        }

        #channels-btn svg {
            flex-shrink: 0;
        }

        .sidebar-label {
            padding: 14px 16px 6px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px 12px;
        }

        .history-list::-webkit-scrollbar {
            width: 3px;
        }

        .history-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: var(--scrollbar);
            border-radius: 99px;
        }

        .history-group {
            margin-bottom: 18px;
        }

        .history-group-label {
            padding: 4px 8px 6px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .history-item {
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
        }

        .history-item:hover {
            background: var(--sidebar-hover);
            color: var(--text);
        }

        .history-item.active {
            background: var(--sidebar-active);
            color: var(--text);
        }

        .history-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            bottom: 20%;
            width: 2px;
            background: var(--accent);
            border-radius: 0 2px 2px 0;
            box-shadow: 0 0 8px var(--accent);
        }


        .history-item-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 13px;
            line-height: 1.4;
            flex: 1;
        }

        .history-item-delete {
            opacity: 0;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 2px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .history-item:hover .history-item-delete {
            opacity: 1;
        }

        .history-item-delete:hover {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }

        .history-item-source {
            font-size: 9px;
            font-weight: 600;
            padding: 1px 5px;
            border-radius: 4px;
            flex-shrink: 0;
            letter-spacing: 0.02em;
            line-height: 1.5;
        }

        .history-item-source.feishu {
            background: rgba(51, 112, 255, 0.15);
            color: #5b8eff;
        }

        .history-item-source.telegram {
            background: rgba(38, 166, 222, 0.15);
            color: #26a6de;
        }

        .history-item-source.qq {
            background: rgba(18, 183, 245, 0.15);
            color: #12b7f5;
        }

        .history-item-source.dingtalk {
            background: rgba(0, 122, 255, 0.15);
            color: #007aff;
        }

        .history-item-source.discord {
            background: rgba(88, 101, 242, 0.15);
            color: #5865f2;
        }

        .history-item-source.web {
            background: rgba(107, 114, 128, 0.15);
            color: #9ca3af;
        }

        .history-item-source.default {
            background: rgba(124, 111, 247, 0.12);
            color: var(--accent);
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
        }

        .model-switcher {
            position: relative;
        }

        .model-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: var(--accent-dim);
            border: 1px solid rgba(124, 111, 247, 0.15);
            border-radius: 8px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.18s ease;
            user-select: none;
        }

        .model-badge:hover {
            background: rgba(124, 111, 247, 0.15);
            border-color: rgba(124, 111, 247, 0.35);
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .model-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 6px rgba(74, 222, 128, 0.6);
            flex-shrink: 0;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .model-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text);
            flex: 1;
        }

        .model-badge-arrow {
            width: 12px;
            height: 12px;
            color: var(--text-dim);
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .model-switcher.open .model-badge-arrow {
            transform: rotate(180deg);
        }

        .model-switcher.open .model-badge {
            border-color: rgba(124, 111, 247, 0.4);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .model-dropdown {
            position: absolute;
            bottom: calc(100% + 6px);
            left: 0;
            right: 0;
            background: #16161c;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 4px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(4px);
            transition: all 0.18s ease;
            z-index: 50;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.4);
        }

        .model-switcher.open .model-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .model-option {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 8px 10px;
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.12s ease;
        }

        .model-option:hover {
            background: var(--sidebar-hover);
        }

        .model-option.active {
            background: var(--accent-dim);
            border: 1px solid rgba(124, 111, 247, 0.2);
        }

        .model-option:not(.active) {
            border: 1px solid transparent;
        }

        .model-option-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .model-option-check {
            width: 14px;
            height: 14px;
            color: var(--accent);
            flex-shrink: 0;
        }

        .model-option-desc {
            font-size: 10px;
            color: var(--text-dim);
            padding-left: 20px;
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            position: relative;
        }

        #main::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px),
            linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 48px 48px;
            opacity: 0.3;
            pointer-events: none;
            mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
        }

        #chat-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #channel-view {
            flex: 1;
            overflow: hidden;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 32px 0 16px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            position: relative;
            z-index: 1;
        }

        #messages::-webkit-scrollbar {
            width: 4px;
        }

        #messages::-webkit-scrollbar-track {
            background: transparent;
        }

        #messages::-webkit-scrollbar-thumb {
            background: var(--scrollbar);
            border-radius: 99px;
        }

        #empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 32px;
            pointer-events: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: none;
            }
        }

        .empty-icon {
            width: 52px;
            height: 52px;
            background: var(--accent-dim);
            border: 1px solid rgba(124, 111, 247, 0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 22px;
            color: var(--accent);
            box-shadow: 0 0 32px var(--accent-glow);
        }

        .empty-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .empty-sub {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            max-width: 300px;
            line-height: 1.6;
        }

        .message-row {
            display: flex;
            padding: 4px 28px;
            animation: slideUp 0.2s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: none;
            }
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.ai {
            justify-content: flex-start;
        }

        .message-row.ai .bubble {
            max-width: 72%;
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }

        .message-row.user .bubble {
            max-width: 68%;
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            margin-top: 2px;
        }

        .avatar.ai-avatar {
            background: var(--accent);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            box-shadow: 0 0 12px var(--accent-glow);
            font-size: 11px;
        }

        .message-content {
            background: var(--user-bubble);
            border-radius: 14px 14px 4px 14px;
            padding: 11px 15px;
            font-size: 14px;
            line-height: 1.65;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .message-row.ai .message-content {
            background: var(--ai-bubble);
            border: none;
            border-radius: 0;
            padding: 6px 0;
            color: var(--text);
        }

        .message-row.ai .message-content p {
            margin: 0 0 12px;
            line-height: 1.7;
        }

        .message-row.ai .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-row.ai .message-content h1,
        .message-row.ai .message-content h2,
        .message-row.ai .message-content h3,
        .message-row.ai .message-content h4,
        .message-row.ai .message-content h5,
        .message-row.ai .message-content h6 {
            color: var(--text);
            font-weight: 600;
            line-height: 1.35;
            margin: 20px 0 10px;
        }

        .message-row.ai .message-content h1 {
            font-size: 1.4em;
        }

        .message-row.ai .message-content h2 {
            font-size: 1.25em;
        }

        .message-row.ai .message-content h3 {
            font-size: 1.1em;
        }

        .message-row.ai .message-content h4,
        .message-row.ai .message-content h5,
        .message-row.ai .message-content h6 {
            font-size: 1em;
        }

        .message-row.ai .message-content > :first-child {
            margin-top: 0;
        }

        .message-row.ai .message-content strong {
            color: #f0f0f8;
            font-weight: 600;
        }

        .message-row.ai .message-content em {
            color: #c8c8d8;
            font-style: italic;
        }

        .message-row.ai .message-content code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(124, 111, 247, 0.1);
            border: 1px solid rgba(124, 111, 247, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.88em;
            color: #c4b5fd;
        }

        .message-row.ai .message-content pre {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin: 14px 0;
        }

        .message-row.ai .message-content pre .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border);
        }

        .message-row.ai .message-content pre .code-lang {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: lowercase;
        }

        .message-row.ai .message-content pre .code-copy {
            background: none;
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text-muted);
            font-family: 'Sora', sans-serif;
            font-size: 11px;
            padding: 2px 10px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .message-row.ai .message-content pre .code-copy:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border-color: rgba(124, 111, 247, 0.3);
        }

        .message-row.ai .message-content pre code {
            display: block;
            background: none;
            border: none;
            padding: 14px 16px;
            color: #c9d1d9;
            font-size: 13px;
            line-height: 1.55;
            overflow-x: auto;
            border-radius: 0;
        }

        .message-row.ai .message-content ul,
        .message-row.ai .message-content ol {
            margin: 10px 0;
            padding-left: 24px;
        }

        .message-row.ai .message-content li {
            margin-bottom: 6px;
            line-height: 1.65;
        }

        .message-row.ai .message-content li > ul,
        .message-row.ai .message-content li > ol {
            margin: 4px 0 0;
        }

        .message-row.ai .message-content blockquote {
            border-left: 3px solid var(--accent);
            margin: 12px 0;
            padding: 8px 16px;
            background: rgba(124, 111, 247, 0.05);
            border-radius: 0 8px 8px 0;
            color: #b0b0c0;
        }

        .message-row.ai .message-content blockquote p {
            margin-bottom: 6px;
        }

        .message-row.ai .message-content blockquote p:last-child {
            margin-bottom: 0;
        }

        .message-row.ai .message-content hr {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 16px 0;
        }

        .message-row.ai .message-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 14px 0;
            font-size: 13px;
        }

        .message-row.ai .message-content th,
        .message-row.ai .message-content td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }

        .message-row.ai .message-content th {
            background: rgba(124, 111, 247, 0.08);
            font-weight: 600;
            color: var(--text);
        }

        .message-row.ai .message-content td {
            background: rgba(255, 255, 255, 0.01);
        }

        .message-row.ai .message-content tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        .message-row.ai .message-content a {
            color: #a78bfa;
            text-decoration: none;
            border-bottom: 1px solid rgba(167, 139, 250, 0.3);
            transition: border-color 0.15s;
        }

        .message-row.ai .message-content a:hover {
            border-bottom-color: #a78bfa;
        }

        .message-row.ai .message-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 10px 0;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 6px 0;
        }

        .typing-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--text-dim);
            animation: typingBounce 1.2s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 80%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            40% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }

        #input-area {
            padding: 12px 24px 20px;
            position: relative;
            z-index: 1;
        }

        #input-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 24px;
            right: 24px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }

        .input-wrapper {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 10px 12px 10px 16px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: rgba(124, 111, 247, 0.4);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #chat-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'Sora', sans-serif;
            font-size: 14px;
            line-height: 1.55;
            resize: none;
            min-height: 24px;
            max-height: 160px;
            overflow-y: auto;
            padding: 3px 0;
        }

        #chat-input::-webkit-scrollbar {
            width: 3px;
        }

        #chat-input::-webkit-scrollbar-thumb {
            background: var(--scrollbar);
            border-radius: 99px;
        }

        #chat-input::placeholder {
            color: var(--text-dim);
        }

        #send-btn {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.18s ease;
            box-shadow: 0 0 16px var(--accent-glow);
        }

        #send-btn:hover {
            background: #8f84f9;
            transform: scale(1.05);
            box-shadow: 0 0 24px rgba(124, 111, 247, 0.4);
        }

        #send-btn:active {
            transform: scale(0.97);
        }

        #send-btn:disabled {
            background: var(--text-dim);
            cursor: default;
            transform: none;
            box-shadow: none;
        }

        .input-hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 10px;
            letter-spacing: 0.03em;
        }

        .input-hint kbd {
            font-family: 'JetBrains Mono', monospace;
            background: var(--sidebar);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 5px;
            font-size: 10px;
        }

        .error-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2d1b1b;
            border: 1px solid #5c2020;
            color: #f87171;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            z-index: 100;
            animation: fadeIn 0.2s ease;
            max-width: 360px;
        }

        .channel-config-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 32px;
            position: relative;
            z-index: 1;
        }

        .channel-config-view::-webkit-scrollbar {
            width: 4px;
        }

        .channel-config-view::-webkit-scrollbar-track {
            background: transparent;
        }

        .channel-config-view::-webkit-scrollbar-thumb {
            background: var(--scrollbar);
            border-radius: 99px;
        }

        .channel-config-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }

        .channel-config-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
        }

        .channel-config-icon.feishu {
            background: rgba(51, 112, 255, 0.15);
            color: #3370ff;
        }

        .channel-config-icon.qq {
            background: rgba(18, 183, 245, 0.15);
            color: #12b7f5;
        }

        .channel-config-icon.dingtalk {
            background: rgba(0, 122, 255, 0.15);
            color: #007aff;
        }

        .channel-config-icon.default {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .channel-config-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
        }

        .channel-config-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .channel-config-card {
            background: var(--sidebar);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            max-width: 480px;
        }

        .channel-config-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .channel-config-row-label {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }

        .channel-toggle {
            position: relative;
            width: 36px;
            height: 20px;
            background: var(--text-dim);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease;
            flex-shrink: 0;
        }

        .channel-toggle.on {
            background: #4ade80;
        }

        .channel-toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s ease;
        }

        .channel-toggle.on::after {
            transform: translateX(16px);
        }

        .channel-config-fields {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .channel-config-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .channel-config-field-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .channel-config-input {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            padding: 10px 14px;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
            width: 100%;
        }

        .channel-config-input:focus {
            border-color: rgba(124, 111, 247, 0.4);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .channel-config-input::placeholder {
            color: var(--text-dim);
        }

        .channel-config-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        .channel-config-save {
            padding: 9px 24px;
            border-radius: 9px;
            font-family: 'Sora', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            border: none;
            background: var(--accent);
            color: #fff;
        }

        .channel-config-save:hover {
            background: #8f84f9;
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .channel-config-save:disabled {
            background: var(--text-dim);
            cursor: default;
            box-shadow: none;
        }

        .channel-save-ok {
            font-size: 12px;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .channel-save-ok.show {
            opacity: 1;
        }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-top">
        <div class="logo">
            <div class="logo-icon">cx</div>
            <span class="logo-text">Code<span>x</span></span>
        </div>
        <button id="new-chat-btn" class="active">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
            新对话
        </button>
        <button id="channels-btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M1.5 5h11M1.5 9h11M5 1.5l-1.5 11M10.5 1.5L9 12.5" stroke="currentColor" stroke-width="1.2"
                      stroke-linecap="round"/>
            </svg>
            频道
        </button>
    </div>

    <div class="sidebar-label">对话历史</div>
    <div class="history-list" id="history-list"></div>

    <div class="sidebar-footer">
        <div class="model-switcher" id="model-switcher">
            <div class="model-dropdown" id="model-dropdown"></div>
            <div class="model-badge" id="model-badge">
                <div class="model-dot"></div>
                <span>模型</span>
                <span class="model-name" id="current-model-name">加载中…</span>
                <svg class="model-badge-arrow" viewBox="0 0 12 12" fill="none">
                    <path d="M3 5l3-3 3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"
                          stroke-linejoin="round"/>
                </svg>
            </div>
        </div>
    </div>
</aside>

<main id="main">
    <div id="chat-view">
        <div id="messages">
            <div id="empty-state">
                <div class="empty-icon">cx</div>
                <div class="empty-title">Codex 已就绪</div>
                <div class="empty-sub">向Codex发送消息，开始你的对话</div>
            </div>
        </div>

        <div id="input-area">
            <div class="input-wrapper">
                <textarea id="chat-input" placeholder="发送消息..." rows="1"></textarea>
                <button id="send-btn" disabled>
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M2 7h10M7.5 2.5L12 7l-4.5 4.5" stroke="white" stroke-width="1.6" stroke-linecap="round"
                              stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="input-hint"><kbd>Enter</kbd> 发送 · <kbd>Shift</kbd>+<kbd>Enter</kbd> 换行</div>
        </div>
    </div>

    <div id="channel-view" style="display:none;"></div>
</main>

<script>
    function copyCode(btn) {
        var code = btn.closest('pre').querySelector('code');
        var text = code.textContent || code.innerText;
        navigator.clipboard.writeText(text).then(function () {
            btn.textContent = '已复制';
            setTimeout(function () {
                btn.textContent = '复制';
            }, 1500);
        });
    }

    (function () {
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const historyList = document.getElementById('history-list');
        const newChatBtn = document.getElementById('new-chat-btn');

        const modelSwitcher = document.getElementById('model-switcher');
        const modelBadge = document.getElementById('model-badge');
        const modelDropdown = document.getElementById('model-dropdown');
        const currentModelNameEl = document.getElementById('current-model-name');

        let currentSessionId = null;
        let isTyping = false;
        let sessions = [];
        let modelConfig = null;

        inputEl.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 160) + 'px';
            sendBtn.disabled = this.value.trim() === '' || isTyping;
        });

        inputEl.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendBtn.disabled) sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        newChatBtn.addEventListener('click', createNewChat);

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        if (typeof marked !== 'undefined') {
            var markedRenderer = new marked.Renderer();
            markedRenderer.code = function (obj) {
                var code = (typeof obj === 'string') ? obj : (obj.text || '');
                var lang = (typeof obj === 'string') ? '' : (obj.lang || '');
                var headerHtml = '<div class="code-header"><span class="code-lang">' + escapeHtml(lang || 'text') + '</span><button class="code-copy" onclick="copyCode(this)">复制</button></div>';
                if (lang && typeof hljs !== 'undefined' && hljs.getLanguage(lang)) {
                    try {
                        var highlighted = hljs.highlight(code, {language: lang}).value;
                        return '<pre>' + headerHtml + '<code class="hljs language-' + escapeHtml(lang) + '">' + highlighted + '</code></pre>';
                    } catch (_) {
                    }
                }
                return '<pre>' + headerHtml + '<code class="hljs">' + escapeHtml(code) + '</code></pre>';
            };

            marked.setOptions({
                renderer: markedRenderer,
                gfm: true,
                breaks: true,
            });
        }

        function scrollBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function clearEmpty() {
            var empty = document.getElementById('empty-state');
            if (empty) empty.remove();
        }

        function showEmptyState() {
            messagesEl.innerHTML =
                '<div id="empty-state">' +
                '<div class="empty-icon">cx</div>' +
                '<div class="empty-title">Codex 已就绪</div>' +
                '<div class="empty-sub">向Codex发送消息，开始你的对话</div>' +
                '</div>';
        }

        function appendMessage(role, text) {
            clearEmpty();
            var row = document.createElement('div');
            row.className = 'message-row ' + role;

            if (role === 'ai') {
                var bubble = document.createElement('div');
                bubble.className = 'bubble';

                var avatar = document.createElement('div');
                avatar.className = 'avatar ai-avatar';
                avatar.textContent = 'cx';

                var content = document.createElement('div');
                content.className = 'message-content';
                try {
                    content.innerHTML = marked.parse(text);
                } catch (e) {
                    content.textContent = text;
                }

                bubble.appendChild(avatar);
                bubble.appendChild(content);
                row.appendChild(bubble);
            } else {
                var bubble = document.createElement('div');
                bubble.className = 'bubble';

                var content = document.createElement('div');
                content.className = 'message-content';
                content.textContent = text;

                bubble.appendChild(content);
                row.appendChild(bubble);
            }

            messagesEl.appendChild(row);
            scrollBottom();
            return row;
        }

        function showTyping() {
            clearEmpty();
            var row = document.createElement('div');
            row.className = 'message-row ai';
            row.id = 'typing-row';
            row.innerHTML =
                '<div class="bubble">' +
                '<div class="avatar ai-avatar">cx</div>' +
                '<div class="message-content">' +
                '<div class="typing-indicator">' +
                '<div class="typing-dot"></div>' +
                '<div class="typing-dot"></div>' +
                '<div class="typing-dot"></div>' +
                '</div>' +
                '</div>' +
                '</div>';
            messagesEl.appendChild(row);
            scrollBottom();
        }

        function removeTyping() {
            var t = document.getElementById('typing-row');
            if (t) t.remove();
        }

        function showError(msg) {
            var toast = document.createElement('div');
            toast.className = 'error-toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(function () {
                toast.remove();
            }, 4000);
        }

        function groupSessionsByDate(list) {
            var now = new Date();
            var today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            var yesterday = today - 86400000;
            var weekAgo = today - 7 * 86400000;

            var groups = {'今天': [], '昨天': [], '上周': [], '更早': []};

            list.forEach(function (s) {
                var t = s.updatedAt || s.createdAt;
                if (t >= today) groups['今天'].push(s);
                else if (t >= yesterday) groups['昨天'].push(s);
                else if (t >= weekAgo) groups['上周'].push(s);
                else groups['更早'].push(s);
            });

            return groups;
        }

        function renderHistory() {
            historyList.innerHTML = '';
            var groups = groupSessionsByDate(sessions);

            Object.keys(groups).forEach(function (label) {
                var items = groups[label];
                if (items.length === 0) return;

                var group = document.createElement('div');
                group.className = 'history-group';

                var groupLabel = document.createElement('div');
                groupLabel.className = 'history-group-label';
                groupLabel.textContent = label;
                group.appendChild(groupLabel);

                items.forEach(function (s) {
                    var item = document.createElement('div');
                    item.className = 'history-item' + (!isChannelView && s.id === currentSessionId ? ' active' : '');
                    item.dataset.id = s.id;

                    var effectiveSource = (s.source && s.source !== 'web') ? s.source : 'web';
                    var meta = CHANNEL_META[effectiveSource];
                    var badge = document.createElement('span');
                    badge.className = 'history-item-source ' + (meta ? meta.iconClass : 'default');
                    badge.textContent = meta ? meta.badge : effectiveSource;
                    item.appendChild(badge);

                    var text = document.createElement('span');
                    text.className = 'history-item-text';
                    text.textContent = s.title;

                    var del = document.createElement('button');
                    del.className = 'history-item-delete';
                    del.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>';
                    del.addEventListener('click', function (e) {
                        e.stopPropagation();
                        deleteSession(s.id);
                    });

                    item.appendChild(text);
                    item.appendChild(del);

                    item.addEventListener('click', function () {
                        loadSession(s.id);
                    });

                    group.appendChild(item);
                });

                historyList.appendChild(group);
            });
        }

        async function fetchSessions() {
            try {
                var res = await fetch('/api/sessions');
                sessions = await res.json();
                renderHistory();
            } catch (e) {
                console.error('Failed to fetch sessions:', e);
            }
        }

        async function createNewChat() {
            if (isChannelView) {
                showChatView();
            }
            if (currentSessionId && !document.querySelector('#messages .message-row')) {
                inputEl.focus();
                return;
            }
            try {
                var res = await fetch('/api/sessions', {method: 'POST'});
                var data = await res.json();
                currentSessionId = data.id;
                showChatView();
                showEmptyState();
                inputEl.value = '';
                inputEl.style.height = 'auto';
                sendBtn.disabled = true;
                inputEl.focus();
                await fetchSessions();
            } catch (e) {
                showError('创建会话失败');
            }
        }

        async function loadSession(id) {
            try {
                var res = await fetch('/api/sessions/' + id);
                if (!res.ok) {
                    showError('加载会话失败');
                    return;
                }
                var data = await res.json();
                currentSessionId = id;

                showChatView();

                messagesEl.innerHTML = '';
                if (data.messages.length === 0) {
                    showEmptyState();
                } else {
                    data.messages.forEach(function (m) {
                        appendMessage(m.role === 'user' ? 'user' : 'ai', m.content);
                    });
                }

                renderHistory();
                inputEl.focus();
            } catch (e) {
                showError('加载会话失败');
            }
        }

        async function deleteSession(id) {
            try {
                await fetch('/api/sessions/' + id, {method: 'DELETE'});
                if (currentSessionId === id) {
                    currentSessionId = null;
                    showEmptyState();
                }
                await fetchSessions();
            } catch (e) {
                showError('删除失败');
            }
        }

        async function sendMessage() {
            var text = inputEl.value.trim();
            if (!text || isTyping || !currentSessionId) return;

            inputEl.value = '';
            inputEl.style.height = 'auto';
            sendBtn.disabled = true;
            isTyping = true;

            appendMessage('user', text);
            showTyping();

            try {
                var res = await fetch('/api/sessions/' + currentSessionId + '/messages', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({content: text}),
                });

                removeTyping();

                if (!res.ok) {
                    var err = await res.json().catch(function () {
                        return {};
                    });
                    showError(err.error || '发送失败，请重试');
                    isTyping = false;
                    return;
                }

                var data = await res.json();
                appendMessage('ai', data.content);

                await fetchSessions();
            } catch (e) {
                removeTyping();
                showError('网络错误，请检查连接');
            }

            isTyping = false;
            sendBtn.disabled = inputEl.value.trim() === '';
        }

        async function fetchModelConfig() {
            try {
                var res = await fetch('/api/model-config');
                modelConfig = await res.json();
                currentModelNameEl.textContent = modelConfig.currentModel;
                renderModelDropdown();
            } catch (e) {
                currentModelNameEl.textContent = 'error';
                console.error('Failed to fetch model config:', e);
            }
        }

        function renderModelDropdown() {
            if (!modelConfig) return;
            modelDropdown.innerHTML = '';
            modelConfig.models.forEach(function (m) {
                var opt = document.createElement('div');
                opt.className = 'model-option' + (m.id === modelConfig.currentModel ? ' active' : '');
                opt.innerHTML =
                    '<div class="model-option-name">' +
                    (m.id === modelConfig.currentModel
                        ? '<svg class="model-option-check" viewBox="0 0 14 14" fill="none"><path d="M2.5 7.5l3 3 6-7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>'
                        : '<span style="width:14px;display:inline-block"></span>') +
                    escapeHtml(m.id) +
                    '</div>' +
                    '<div class="model-option-desc">' + escapeHtml(m.description) + '</div>';
                opt.addEventListener('click', function (e) {
                    e.stopPropagation();
                    switchModel(m.id);
                });
                modelDropdown.appendChild(opt);
            });
        }

        async function switchModel(modelId) {
            if (!modelConfig || modelId === modelConfig.currentModel) {
                modelSwitcher.classList.remove('open');
                return;
            }
            try {
                var res = await fetch('/api/model-config', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({modelId: modelId}),
                });
                if (!res.ok) {
                    var err = await res.json().catch(function () {
                        return {};
                    });
                    showError(err.error || '切换模型失败');
                    return;
                }
                modelConfig = await res.json();
                currentModelNameEl.textContent = modelConfig.currentModel;
                renderModelDropdown();
                modelSwitcher.classList.remove('open');
            } catch (e) {
                showError('切换模型失败');
            }
        }

        modelBadge.addEventListener('click', function (e) {
            e.stopPropagation();
            modelSwitcher.classList.toggle('open');
        });

        document.addEventListener('click', function (e) {
            if (!modelSwitcher.contains(e.target)) {
                modelSwitcher.classList.remove('open');
            }
        });

        const chatView = document.getElementById('chat-view');
        const channelView = document.getElementById('channel-view');
        const channelsBtn = document.getElementById('channels-btn');

        const CHANNEL_META = {
            web: {name: '本地', icon: '本', iconClass: 'web', badge: '本地'},
            feishu: {name: '飞书', icon: '飞', iconClass: 'feishu', badge: '飞书'},
            qq: {name: 'QQ', icon: 'Q', iconClass: 'qq', badge: 'QQ'},
            dingtalk: {name: '钉钉', icon: '钉', iconClass: 'dingtalk', badge: '钉钉'},
            telegram: {name: 'Telegram', icon: 'T', iconClass: 'telegram', badge: 'TG'},
            discord: {name: 'Discord', icon: 'D', iconClass: 'discord', badge: 'DC'},
        };

        function getChannelMeta(type) {
            return CHANNEL_META[type] || {name: type, icon: type.charAt(0).toUpperCase(), iconClass: 'default'};
        }

        var channelsData = null;
        var isChannelView = false;

        function showChatView() {
            isChannelView = false;
            chatView.style.display = 'flex';
            channelView.style.display = 'none';
            channelsBtn.classList.remove('active');
            newChatBtn.classList.add('active');
            renderHistory();
        }

        function showChannelsPage() {
            isChannelView = true;
            chatView.style.display = 'none';
            channelView.style.display = 'flex';
            channelsBtn.classList.add('active');
            newChatBtn.classList.remove('active');
            renderHistory();
            renderAllChannels();
        }

        channelsBtn.addEventListener('click', function () {
            if (isChannelView) return;
            if (!channelsData) {
                fetchChannels().then(function () {
                    showChannelsPage();
                });
            } else {
                showChannelsPage();
            }
        });

        async function fetchChannels() {
            try {
                var res = await fetch('/api/channels');
                channelsData = await res.json();
            } catch (e) {
                console.error('Failed to fetch channels:', e);
            }
        }

        function renderAllChannels() {
            channelView.innerHTML = '';
            if (!channelsData || !channelsData.registered) return;

            var wrapper = document.createElement('div');
            wrapper.className = 'channel-config-view';

            var header = document.createElement('div');
            header.className = 'channel-config-header';
            header.innerHTML =
                '<div class="channel-config-icon default">' +
                '<svg width="20" height="20" viewBox="0 0 14 14" fill="none"><path d="M1.5 5h11M1.5 9h11M5 1.5l-1.5 11M10.5 1.5L9 12.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>' +
                '</div>' +
                '<div>' +
                '<div class="channel-config-title">频道管理</div>' +
                '<div class="channel-config-subtitle">配置和管理你的消息频道</div>' +
                '</div>';
            wrapper.appendChild(header);

            channelsData.registered.forEach(function (type) {
                var cfg = (channelsData.config && channelsData.config[type]) || {};
                var meta = getChannelMeta(type);
                var isOn = !!cfg.enabled;

                var card = document.createElement('div');
                card.className = 'channel-config-card';
                card.style.marginBottom = '20px';
                card.innerHTML =
                    '<div class="channel-config-row">' +
                    '<div style="display:flex;align-items:center;gap:10px">' +
                    '<div class="channel-config-icon ' + meta.iconClass + '" style="width:32px;height:32px;border-radius:8px;font-size:15px">' + escapeHtml(meta.icon) + '</div>' +
                    '<span class="channel-config-row-label">' + escapeHtml(meta.name) + '</span>' +
                    '</div>' +
                    '<button class="channel-toggle ' + (isOn ? 'on' : '') + '" id="ch-toggle-' + type + '"></button>' +
                    '</div>' +
                    '<div class="channel-config-fields">' +
                    '<div class="channel-config-field">' +
                    '<label class="channel-config-field-label">App ID</label>' +
                    '<input class="channel-config-input" id="ch-appid-' + type + '" value="' + escapeHtml(cfg.appId || '') + '" placeholder="输入 App ID" spellcheck="false">' +
                    '</div>' +
                    '<div class="channel-config-field">' +
                    '<label class="channel-config-field-label">App Secret</label>' +
                    '<input class="channel-config-input" id="ch-secret-' + type + '" type="password" value="' + escapeHtml(cfg.appSecret || '') + '" placeholder="输入 App Secret" spellcheck="false">' +
                    '</div>' +
                    '</div>' +
                    '<div class="channel-config-actions">' +
                    '<button class="channel-config-save" id="ch-save-' + type + '">保存</button>' +
                    '<span class="channel-save-ok" id="save-ok-' + type + '">' +
                    '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6.5l2.5 2.5L10 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
                    '已保存' +
                    '</span>' +
                    '</div>';

                wrapper.appendChild(card);
            });

            channelView.appendChild(wrapper);

            channelsData.registered.forEach(function (type) {
                var toggle = document.getElementById('ch-toggle-' + type);
                toggle.addEventListener('click', function () {
                    toggle.classList.toggle('on');
                });

                var saveBtn = document.getElementById('ch-save-' + type);
                saveBtn.addEventListener('click', function () {
                    saveChannel(type);
                });
            });
        }

        async function saveChannel(type) {
            var toggle = document.getElementById('ch-toggle-' + type);
            var appIdInput = document.getElementById('ch-appid-' + type);
            var appSecretInput = document.getElementById('ch-secret-' + type);
            var saveBtn = document.getElementById('ch-save-' + type);

            var payload = {
                enabled: toggle.classList.contains('on'),
                appId: appIdInput.value.trim(),
                appSecret: appSecretInput.value.trim(),
            };

            saveBtn.disabled = true;
            saveBtn.textContent = '保存中…';

            try {
                var res = await fetch('/api/channels/' + type, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload),
                });

                if (!res.ok) {
                    var err = await res.json().catch(function () {
                        return {};
                    });
                    showError(err.error || '保存失败');
                    return;
                }

                var updatedConfig = await res.json();
                if (channelsData) {
                    channelsData.config = updatedConfig;
                }

                var okEl = document.getElementById('save-ok-' + type);
                okEl.classList.add('show');
                setTimeout(function () {
                    okEl.classList.remove('show');
                }, 2000);
            } catch (e) {
                showError('保存频道配置失败');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '保存';
            }
        }

        async function init() {
            await Promise.all([fetchSessions(), fetchModelConfig()]);
            if (sessions.length > 0) {
                await loadSession(sessions[0].id);
            } else {
                await createNewChat();
            }
            inputEl.focus();
        }

        init();
    })();
</script>
</body>
</html>
